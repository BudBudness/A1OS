<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A1OS Chat</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:system-ui; }
        body { background:#0a0a0f; color:#e0e0e0; height:100vh; display:flex; flex-direction:column; max-width:480px; margin:auto; }
        .header { padding:16px 20px; background:#14141e; border-bottom:1px solid #2a2a44; display:flex; justify-content:space-between; align-items:center; flex-shrink:0; }
        .header h1 { font-size:18px; font-weight:600; background:linear-gradient(135deg,#6c5ce7,#a29bfe); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .status { font-size:12px; padding:4px 10px; border-radius:20px; }
        .online { background:#00d2a0; color:#000; }
        .offline { background:#ff6b6b; color:#000; }
        .messages { flex:1; overflow-y:auto; padding:16px 20px; display:flex; flex-direction:column; gap:12px; }
        .message { padding:12px 16px; border-radius:16px; max-width:85%; word-wrap:break-word; font-size:14px; line-height:1.5; animation:fadeIn 0.2s ease; }
        .user { background:#6c5ce7; color:#fff; align-self:flex-end; border-bottom-right-radius:4px; }
        .ai { background:#1a1a2e; color:#e0e0e0; align-self:flex-start; border-bottom-left-radius:4px; border:1px solid #2a2a44; white-space:pre-wrap; }
        .system { background:#14141e; color:#8888aa; align-self:center; font-size:12px; padding:6px 14px; border-radius:20px; border:1px solid #2a2a44; }
        .typing { background:#1a1a2e; color:#8888aa; align-self:flex-start; padding:12px 16px; border-radius:16px; border-bottom-left-radius:4px; border:1px solid #2a2a44; font-size:14px; animation:pulse 1.5s infinite; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
        @keyframes pulse { 0%,100% { opacity:0.6; } 50% { opacity:1; } }
        .input-area { padding:12px 16px; background:#14141e; border-top:1px solid #2a2a44; display:flex; gap:10px; flex-shrink:0; }
        .input-area input { flex:1; padding:12px 16px; border-radius:24px; border:1px solid #2a2a44; background:#0f0f1a; color:#e0e0e0; font-size:14px; outline:none; }
        .input-area input:focus { border-color:#6c5ce7; }
        .input-area input::placeholder { color:#555577; }
        .input-area button { padding:12px 20px; border-radius:24px; border:none; background:#6c5ce7; color:#fff; font-weight:600; font-size:14px; cursor:pointer; }
        .input-area button:active { transform:scale(0.95); }
        .quick-actions { display:flex; gap:8px; padding:8px 16px 12px; flex-wrap:wrap; background:#0a0a0f; flex-shrink:0; }
        .quick-actions button { padding:6px 14px; border-radius:20px; border:1px solid #2a2a44; background:#14141e; color:#8888aa; font-size:12px; cursor:pointer; }
        .quick-actions button:active { background:#2a2a44; }
        .hidden { display:none; }
        #memoryCount { display:inline; color:#6c5ce7; font-weight:bold; }
    </style>
</head>
<body>
    <div class="header">
        <h1>⚡ A1OS Chat</h1>
        <span class="status offline" id="statusBadge">● Offline</span>
    </div>
    <div class="messages" id="messages">
        <div class="system">🔌 Connecting to A1OS backend...</div>
    </div>
    <div class="quick-actions" id="quickActions">
        <button data-q="show memory">🧠 Show memory</button>
        <button data-q="help">❓ Help</button>
        <button data-q="status">📡 Status</button>
    </div>
    <div class="input-area">
        <input id="chatInput" placeholder="Ask A1OS..." autofocus>
        <button id="sendBtn">Send</button>
    </div>
    <script>
        const API = 'http://localhost:8086';
        const messages = document.getElementById('messages');
        const input = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const statusBadge = document.getElementById('statusBadge');

        let isOnline = false;
        let memoryData = [];

        function addMessage(text, type = 'ai') {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.textContent = text;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        function addSystem(text) {
            const div = document.createElement('div');
            div.className = 'system';
            div.textContent = text;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        function showTyping() {
            const div = document.createElement('div');
            div.className = 'typing';
            div.id = 'typingIndicator';
            div.textContent = '⚡ A1OS is thinking...';
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        function hideTyping() {
            const el = document.getElementById('typingIndicator');
            if (el) el.remove();
        }

        async function updateStatus() {
            try {
                const res = await fetch(API + '/');
                const data = await res.json();
                if (data.status === 'online') {
                    isOnline = true;
                    statusBadge.className = 'status online';
                    statusBadge.textContent = '● Online';
                } else {
                    throw new Error('Offline');
                }
            } catch {
                isOnline = false;
                statusBadge.className = 'status offline';
                statusBadge.textContent = '● Offline';
            }
        }

        async function loadMemory() {
            try {
                const res = await fetch(API + '/memory');
                const data = await res.json();
                if (Array.isArray(data)) {
                    memoryData = data;
                    const count = data.length;
                    const statusText = statusBadge.textContent;
                    if (isOnline) {
                        statusBadge.textContent = `● Online | ${count} entries`;
                    }
                    addSystem(`📚 Memory updated: ${count} entries`);
                }
            } catch {}
        }

        async function handleQuery(query) {
            if (!query.trim()) return;
            addMessage(query, 'user');
            input.value = '';
            if (!isOnline) {
                addMessage('⚠️ Backend is offline.', 'ai');
                return;
            }
            showTyping();
            try {
                const searchRes = await fetch(API + '/memory/search?q=' + encodeURIComponent(query));
                const searchData = await searchRes.json();
                hideTyping();
                if (Array.isArray(searchData) && searchData.length > 0) {
                    const results = searchData.map(item => '• ' + item.text).join('\n');
                    addMessage(`📚 Found ${searchData.length} results:\n${results}`, 'ai');
                } else {
                    addMessage(`🤔 No memory found for: "${query}"`, 'ai');
                }
            } catch {
                hideTyping();
                addMessage('❌ Error connecting to backend.', 'ai');
            }
        }

        async function handleCommand(cmd) {
            if (cmd === 'show memory') {
                if (memoryData.length === 0) {
                    addMessage('📭 Memory is empty.', 'ai');
                } else {
                    const list = memoryData.map(item => '• ' + item.text).join('\n');
                    addMessage(`🧠 Memory (${memoryData.length} entries):\n${list}`, 'ai');
                }
                return;
            }
            if (cmd === 'status') {
                try {
                    const res = await fetch(API + '/system/status');
                    const data = await res.json();
                    addMessage(`📡 System Status:\n• Status: ${data.status}\n• Memory: ${data.memory_count}\n• Agents: ${data.agent_count}\n• Tasks: ${data.tasks_pending}\n• Events: ${data.events_count}`, 'ai');
                } catch {
                    addMessage('❌ Failed to get status.', 'ai');
                }
                return;
            }
            if (cmd === 'help') {
                addMessage(`🤖 A1OS Commands:\n• Type any question to search memory\n• "show memory" - list all entries\n• "status" - full system status\n• "help" - show this message`, 'ai');
                return;
            }
            await handleQuery(cmd);
        }

        sendBtn.addEventListener('click', () => handleCommand(input.value));
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleCommand(input.value);
        });

        document.querySelectorAll('.quick-actions button').forEach(btn => {
            btn.addEventListener('click', () => {
                handleCommand(btn.dataset.q);
            });
        });

        async function init() {
            await updateStatus();
            await loadMemory();
            if (isOnline) {
                addSystem(`✅ Connected to A1OS backend | ${memoryData.length} memory entries`);
            } else {
                addSystem('❌ Cannot connect to backend.');
            }
            input.focus();
        }

        init();
        setInterval(updateStatus, 30000);
        setInterval(loadMemory, 60000);
    </script>
</body>
</html>
