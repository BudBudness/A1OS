<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM MATRIX CONTROL</title>
    <style>
        :root {
            --bg-main: #06060c;
            --bg-sidebar: #0b0b14;
            --bg-card: #111122;
            --bg-input: #16162d;
            --border: #1f1f3a;
            --text-main: #d1d1e0;
            --text-muted: #6b6b8c;
            --accent-orange: #d97706;
            --accent-green: #10b981;
            --font-mono: 'Courier New', Courier, monospace;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: var(--font-mono);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        #sidebar {
            width: 280px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 24px 16px;
        }
        .sidebar-top {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .sidebar-logo {
            font-size: 0.9rem;
            letter-spacing: 2px;
            font-weight: bold;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }
        .logo-dot {
            width: 8px;
            height: 8px;
            background: var(--accent-orange);
            border-radius: 50%;
        }
        .chat-history {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .history-item {
            padding: 12px;
            background: rgba(255,255,255,0.02);
            border: 1px solid transparent;
            border-radius: 6px;
            font-size: 0.8rem;
            color: var(--text-muted);
            cursor: pointer;
        }
        .history-item.active {
            border-color: var(--border);
            color: #fff;
            background: var(--bg-card);
        }
        .sidebar-bottom {
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }
        .settings-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }
        .status-pill {
            background: rgba(217, 119, 6, 0.1);
            border: 1px solid var(--accent-orange);
            color: var(--accent-orange);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .status-pill.connected {
            background: rgba(16, 185, 129, 0.1);
            border-color: var(--accent-green);
            color: var(--accent-green);
        }
        #main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        #main-header {
            padding: 20px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }
        .header-title {
            font-size: 1rem;
            letter-spacing: 2px;
            font-weight: bold;
            color: #fff;
        }
        #chat-stream {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .message-block {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
        }
        .block-header {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
        }
        .block-content {
            font-size: 0.9rem;
            line-height: 1.6;
            color: var(--text-main);
            white-space: pre-wrap;
        }
        .preview-thumbnail {
            max-width: 100%;
            max-height: 200px;
            border-radius: 4px;
            border: 1px solid var(--border);
            margin-top: 12px;
            display: block;
        }
        #input-container {
            padding: 24px;
            background: linear-gradient(transparent, var(--bg-main) 30%);
        }
        .input-pill {
            max-width: 800px;
            margin: 0 auto;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            display: flex;
            align-items: center;
            padding: 8px 16px;
            gap: 12px;
        }
        .input-pill input {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            font-family: var(--font-mono);
            font-size: 0.85rem;
            outline: none;
            padding: 8px 0;
        }
        .action-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            transition: color 0.2s;
        }
        .action-btn:hover { color: #fff; }
        .action-btn.recording { color: #ef4444; animation: blink 1.5s infinite; }
        @keyframes blink { 50% { opacity: 0.4; } }
    </style>
</head>
<body>
    <div id="sidebar">
        <div class="sidebar-top">
            <div class="sidebar-logo">
                <div class="logo-dot"></div>
                <span>A1OS CORE</span>
            </div>
            <div class="chat-history">
                <div class="history-item active">Operational Shell</div>
                <div class="history-item">Agent Matrix Logs</div>
                <div class="history-item">Task Orchestration</div>
            </div>
        </div>
        <div class="sidebar-bottom">
            <div class="settings-row">
                <span>Active Agents</span>
                <span style="color:#fff;" id="active-agents-count">0</span>
            </div>
            <div class="settings-row">
                <span>Pending Tasks</span>
                <span style="color:#fff;" id="pending-tasks-count">0</span>
            </div>
            <div class="settings-row" style="margin-top: 8px;">
                <span>Node Matrix</span>
                <div class="status-pill connected" id="node-status">
                    <span>CONNECTED</span>
                </div>
            </div>
        </div>
    </div>
    <div id="main-content">
        <div id="main-header">
            <div class="header-title">SYSTEM MATRIX CONTROL</div>
            <div class="status-pill" id="kernel-status">OFFLINE</div>
        </div>
        <div id="chat-stream">
            <div class="message-block">
                <div class="block-header"><span>[00:00:00] [SYS]</span></div>
                <div class="block-content">A1OS operational core online. Monitoring state matrix pipelines...</div>
            </div>
        </div>
        <div id="input-container">
            <div class="input-pill">
                <button class="action-btn" onclick="triggerMediaSelect()" title="Upload Image Layer">📎</button>
                <button class="action-btn" id="voice-btn" onclick="toggleVoice()" title="Stream Voice Directive">🎙️</button>
                <input type="text" id="shell-in" placeholder="Say or type core execution commands..." onkeydown="if(event.key==='Enter') submitDirective()" />
                <button class="action-btn" onclick="submitDirective()" style="color:var(--accent-green);">▶</button>
            </div>
            <input type="file" id="media-file-input" accept="image/*" style="display:none;" onchange="processMedia(this)">
        </div>
    </div>
    <script>
        const API_BASE = 'http://localhost:8086';
        let recognition = null;
        let pendingImage64 = null;

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
                for(let registration of registrations) {
                    registration.unregister();
                }
            });
        }

        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechEngine = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechEngine();
            recognition.continuous = false;
            recognition.lang = 'en-US';
            recognition.onresult = (e) => {
                document.getElementById('shell-in').value = e.results[0][0].transcript;
                document.getElementById('voice-btn').classList.remove('recording');
            };
            recognition.onerror = () => document.getElementById('voice-btn').classList.remove('recording');
            recognition.onend = () => document.getElementById('voice-btn').classList.remove('recording');
        }

        function toggleVoice() {
            if (!recognition) return alert("Native speech module inaccessible.");
            const btn = document.getElementById('voice-btn');
            if (btn.classList.contains('recording')) {
                recognition.stop();
            } else {
                btn.classList.add('recording');
                recognition.start();
            }
        }

        function triggerMediaSelect() {
            document.getElementById('media-file-input').click();
        }

        function processMedia(input) {
            if (input.files && input.files[0]) {
                const r = new FileReader();
                r.onload = function(e) {
                    pendingImage64 = e.target.result;
                    appendBlock('OPERATIONAL NODE', 'Attached Image Asset Layer.');
                    const stream = document.getElementById('chat-stream');
                    const img = document.createElement('img');
                    img.src = pendingImage64;
                    img.className = 'preview-thumbnail';
                    stream.lastElementChild.querySelector('.block-content').appendChild(img);
                };
                r.readAsDataURL(input.files[0]);
            }
        }

        function appendBlock(header, content) {
            const stream = document.getElementById('chat-stream');
            const time = new Date().toTimeString().split(' ')[0];
            const block = document.createElement('div');
            block.className = 'message-block';
            block.innerHTML = `
                <div class="block-header"><span>[${time}] [${header}]</span></div>
                <div class="block-content">${content}</div>
            `;
            stream.appendChild(block);
            stream.scrollTop = stream.scrollHeight;
        }

        async function trackKernel() {
            try {
                const res = await fetch(`${API_BASE}/agents/stats`);
                if(!res.ok) throw new Error();
                const data = await res.json();
                const badge = document.getElementById('kernel-status');
                badge.innerText = "CONNECTED";
                badge.className = "status-pill connected";
                if (data.active_agents !== undefined) document.getElementById('active-agents-count').innerText = data.active_agents;
                if (data.pending_tasks !== undefined) document.getElementById('pending-tasks-count').innerText = data.pending_tasks;
            } catch(e) {
                const badge = document.getElementById('kernel-status');
                badge.innerText = "OFFLINE";
                badge.className = "status-pill";
            }
        }

        async function submitDirective() {
            const el = document.getElementById('shell-in');
            const cmd = el.value.trim();
            if(!cmd && !pendingImage64) return;
            el.value = '';
            if(cmd) appendBlock('OPERATOR', cmd);
            const packet = { payload: cmd, media: pendingImage64 };
            pendingImage64 = null;
            try {
                const res = await fetch(`${API_BASE}/`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(packet)
                });
                const data = await res.json();
                appendBlock('AGENT METRIC', typeof data === 'string' ? data : JSON.stringify(data, null, 2));
            } catch(e) {
                appendBlock('SYS_ERR', 'Direct endpoint link broken.');
            }
        }

        setInterval(trackKernel, 3000);
        trackKernel();
    </script>
</body>
</html>
