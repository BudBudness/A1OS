<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>A1OS v2.0</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{background:#0a0a0f;color:#e0e0e0;height:100vh;display:flex;flex-direction:column;max-width:480px;margin:auto}
.header{padding:16px 20px;background:#14141e;border-bottom:1px solid #2a2a44;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:18px;background:linear-gradient(135deg,#6c5ce7,#a29bfe);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.status{font-size:12px;padding:4px 10px;border-radius:20px}
.online{background:#00d2a0;color:#000}
.offline{background:#ff6b6b;color:#000}
.nav{display:flex;justify-content:space-around;padding:8px 0;background:#14141e;border-bottom:1px solid #2a2a44;overflow-x:auto}
.nav button{background:transparent;border:none;color:#888;font-size:12px;padding:6px 12px;cursor:pointer;white-space:nowrap}
.nav button.active{color:#6c5ce7;background:#1a1a2e;border-radius:8px}
.content{flex:1;overflow-y:auto;padding:16px}
.panel{display:none}
.panel.active{display:block}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat-card{background:#14141e;padding:16px;border-radius:12px;border:1px solid #2a2a44}
.stat-value{font-size:24px;font-weight:700;display:block}
.stat-label{font-size:12px;color:#888}
.entry{padding:8px;border-bottom:1px solid #2a2a44;font-size:14px}
.input-area{padding:12px 16px;background:#14141e;border-top:1px solid #2a2a44;display:flex;gap:10px}
.input-area input{flex:1;padding:12px 16px;border-radius:24px;border:1px solid #2a2a44;background:#0f0f1a;color:#e0e0e0;outline:none}
.input-area button{padding:12px 20px;border-radius:24px;border:none;background:#6c5ce7;color:#fff;font-weight:600;cursor:pointer}
.quick{display:flex;gap:8px;padding:8px 16px;flex-wrap:wrap}
.quick button{padding:6px 14px;border-radius:20px;border:1px solid #2a2a44;background:#14141e;color:#888;font-size:12px;cursor:pointer}
</style>
</head>
<body>
<div class="header"><h1>⚡ A1OS</h1><span class="status offline" id="status">● Offline</span></div>
<div class="nav" id="nav"></div>
<div class="content" id="content">
<div class="panel active" id="panel-dashboard"><div class="stat-grid" id="stats"></div><div id="output"></div></div>
<div class="panel" id="panel-memory"><div id="memoryList"></div></div>
<div class="panel" id="panel-knowledge"><div id="knowledgeList"></div></div>
<div class="panel" id="panel-agents"><div id="agentList"></div></div>
<div class="panel" id="panel-tasks"><div id="taskList"></div></div>
<div class="panel" id="panel-cluster"><div id="clusterView"></div></div>
<div class="panel" id="panel-consensus"><div id="consensusLog"></div></div>
</div>
<div class="quick"><button onclick="sendCmd('show memory')">🧠 Memory</button><button onclick="sendCmd('status')">📡 Status</button><button onclick="sendCmd('help')">❓ Help</button></div>
<div class="input-area"><input id="input" placeholder="Ask or add: text"><button onclick="send()">Send</button></div>
<script>
const API = 'http://localhost:8086';
const API_KEY = 'e6d4f897ff9934ed5d61309bf1286436f96c0dd55a9c7b42b921c2936011267d';

const MODULES = ['dashboard','memory','knowledge','agents','tasks','cluster','consensus'];

async function call(url, opts) {
    try {
        const res = await fetch(url, {
            ...opts,
            headers: { 'X-API-Key': API_KEY, 'Content-Type': 'application/json', ...(opts?.headers || {}) }
        });
        if (!res.ok) throw new Error(res.status);
        return await res.json();
    } catch(e) { console.error(e); return null; }
}

async function updateStatus() {
    const data = await call(API + '/');
    if (data && data.status === 'online') {
        document.getElementById('status').className = 'status online';
        document.getElementById('status').textContent = '● Online';
    } else {
        document.getElementById('status').className = 'status offline';
        document.getElementById('status').textContent = '● Offline';
    }
}

function renderNav() {
    const nav = document.getElementById('nav');
    nav.innerHTML = MODULES.map(m => `<button class="${m==='dashboard'?'active':''}" data-panel="${m}">${m.toUpperCase()}</button>`).join('');
    nav.querySelectorAll('button').forEach(b => {
        b.addEventListener('click', () => {
            nav.querySelectorAll('button').forEach(x => x.classList.remove('active'));
            b.classList.add('active');
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById('panel-'+b.dataset.panel).classList.add('active');
        });
    });
}

async function loadAll() {
    const s = await call(API + '/system/status');
    if (s) {
        document.getElementById('stats').innerHTML = 
            `<div class="stat-card"><span class="stat-value">${s.modules?.length||0}</span><span class="stat-label">Modules</span></div>
             <div class="stat-card"><span class="stat-value">${s.status||'offline'}</span><span class="stat-label">Status</span></div>
             <div class="stat-card"><span class="stat-value">v2.0</span><span class="stat-label">Version</span></div>
             <div class="stat-card"><span class="stat-value">${new Date().toLocaleTimeString()}</span><span class="stat-label">Uptime</span></div>`;
    }
    const mem = await call(API + '/memory');
    if (mem && Array.isArray(mem)) {
        document.getElementById('memoryList').innerHTML = mem.length ? mem.map(m => `<div class="entry">${m.content||m.text}</div>`).join('') : '<div style="color:#888;padding:16px;">Empty</div>';
    }
    const knowledge = await call(API + '/knowledge');
    if (knowledge && Array.isArray(knowledge)) {
        document.getElementById('knowledgeList').innerHTML = knowledge.length ? knowledge.map(k => `<div class="entry"><strong>${k.key}:</strong> ${JSON.stringify(k.value)}</div>`).join('') : '<div style="color:#888;padding:16px;">Empty</div>';
    }
    const agents = await call(API + '/agents');
    if (agents && Array.isArray(agents)) {
        document.getElementById('agentList').innerHTML = agents.length ? agents.map(a => `<div class="entry">${a.name} (${a.status})</div>`).join('') : '<div style="color:#888;padding:16px;">No agents</div>';
    }
    const tasks = await call(API + '/scheduler/tasks');
    if (tasks && Array.isArray(tasks)) {
        document.getElementById('taskList').innerHTML = tasks.length ? tasks.map(t => `<div class="entry">${t.name} (${t.status})</div>`).join('') : '<div style="color:#888;padding:16px;">No tasks</div>';
    }
    const cluster = await call(API + '/cluster/nodes');
    if (cluster && Array.isArray(cluster)) {
        document.getElementById('clusterView').innerHTML = cluster.length ? cluster.map(n => `<div class="entry">${n.address} (${n.status})</div>`).join('') : '<div style="color:#888;padding:16px;">No nodes</div>';
    }
    const consensus = await call(API + '/consensus/log');
    if (consensus && Array.isArray(consensus)) {
        document.getElementById('consensusLog').innerHTML = consensus.length ? consensus.map(c => `<div class="entry">Term ${c.term}: ${c.proposal} (${c.status})</div>`).join('') : '<div style="color:#888;padding:16px;">No entries</div>';
    }
}

async function sendCmd(cmd) {
    const out = document.getElementById('output');
    if (!cmd || !cmd.trim()) return;
    out.innerHTML = '⏳...';
    const c = cmd.toLowerCase().trim();
    try {
        if (c.includes('show memory') || c.includes('memory')) {
            const m = await call(API + '/memory');
            if (m && m.length) out.innerHTML = '🧠 '+m.length+' entries:<br>'+m.map(x=>'• '+(x.content||x.text)).join('<br>');
            else out.innerHTML = '📭 Empty';
        } else if (c.includes('status')) {
            const s = await call(API + '/system/status');
            if (s) out.innerHTML = '📡 Modules: '+(s.modules?.join(', ')||'none')+' | Status: '+s.status;
        } else if (c.includes('help')) {
            out.innerHTML = '🤖 Commands: "show memory", "status", "add: text", or search';
        } else if (c.startsWith('add:')) {
            const text = c.slice(4).trim();
            if (text) {
                const r = await call(API + '/memory/store', { method: 'POST', body: JSON.stringify({content:text,type:'long_term'}) });
                if (r && r.ok) { out.innerHTML = '✅ Added: '+text; loadAll(); }
                else out.innerHTML = '❌ Error';
            }
        } else {
            const r = await call(API + '/memory/search?q=' + encodeURIComponent(cmd));
            if (r && r.length) out.innerHTML = '🔍 '+r.map(x=>'• '+(x.content||x.text)).join('<br>');
            else out.innerHTML = '🤔 No results';
        }
    } catch(e) { out.innerHTML = '❌ Error'; }
    setTimeout(() => out.innerHTML = '', 5000);
}

document.getElementById('input').addEventListener('keypress', e => { if (e.key === 'Enter') send(); });
async function send() {
    const input = document.getElementById('input');
    const val = input.value;
    input.value = '';
    await sendCmd(val);
}

renderNav();
updateStatus();
loadAll();
setInterval(updateStatus, 30000);
setInterval(loadAll, 60000);
</script>
</body>
</html>
