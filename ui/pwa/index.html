<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>A1OS</title>
<style>*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}body{background:#0b0b12;color:#e2e8f0;height:100vh;display:flex;overflow:hidden}.sidebar{width:72px;background:#11111a;border-right:1px solid #2a2a3e;display:flex;flex-direction:column;align-items:center;padding:20px 0;flex-shrink:0;height:100vh}.logo-circle{display:inline-flex;align-items:center;justify-content:center;width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#6c5ce7,#a29bfe);color:#fff;font-weight:700;font-size:16px;margin-bottom:32px}.sidebar-nav{display:flex;flex-direction:column;gap:4px;width:100%;padding:0 8px;flex:1}.sidebar-nav button{background:transparent;border:none;color:#64748b;font-size:20px;padding:10px;border-radius:12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;width:100%;position:relative}.sidebar-nav button span{font-size:9px;text-transform:uppercase}.sidebar-nav button:hover{background:#1a1a2e;color:#cbd5e1}.sidebar-nav button.active{background:#1a1a2e;color:#a78bfa}.sidebar-nav button.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:24px;background:#a78bfa}.sidebar-nav button.settings{margin-top:auto}.sidebar-status{margin-top:auto;padding-top:16px;border-top:1px solid #1a1a2e;width:100%;display:flex;flex-direction:column;align-items:center;gap:6px}.sidebar-status .dot{width:10px;height:10px;border-radius:50%;display:inline-block}.sidebar-status .dot.online{background:#10b981}.sidebar-status .dot.offline{background:#ef4444}.sidebar-status span{font-size:9px;color:#64748b;text-transform:uppercase}.main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;background:#0b0b12}.chat-container{flex:1;overflow-y:auto;padding:24px 32px;display:flex;flex-direction:column;gap:16px}.chat-container::-webkit-scrollbar{width:4px}.chat-container::-webkit-scrollbar-thumb{background:#2a2a3e;border-radius:8px}.message{max-width:70%;padding:12px 18px;border-radius:16px;font-size:14px;line-height:1.6}.message.user{align-self:flex-end;background:#1a1a2e;border:1px solid #2a2a3e;color:#e2e8f0;border-bottom-right-radius:4px}.message.ai{align-self:flex-start;background:#11111a;border:1px solid #2a2a3e;color:#cbd5e1;border-bottom-left-radius:4px}.message.system{align-self:center;background:transparent;color:#64748b;font-size:12px;padding:8px 16px;border-bottom:1px solid #1a1a2e;border-radius:0;max-width:100%}.input-area{padding:16px 32px 24px;background:#0b0b12;border-top:1px solid #1a1a2e;display:flex;gap:12px;flex-shrink:0}.input-area input{flex:1;padding:12px 18px;border-radius:24px;border:1px solid #2a2a3e;background:#11111a;color:#e2e8f0;font-size:14px;outline:none}.input-area input:focus{border-color:#6c5ce7}.input-area input::placeholder{color:#475569}.input-area button{padding:12px 28px;border-radius:24px;border:none;background:#6c5ce7;color:#fff;font-weight:600;font-size:14px;cursor:pointer}.input-area button:hover{background:#5a4bd1}.quick-actions{padding:0 32px 8px;display:flex;gap:8px;flex-wrap:wrap}.quick-actions button{padding:6px 14px;border-radius:20px;border:1px solid #2a2a3e;background:transparent;color:#94a3b8;font-size:12px;cursor:pointer}.quick-actions button:hover{background:#1a1a2e;border-color:#6c5ce7;color:#e2e8f0}</style></head>
<body><aside class="sidebar"><div class="logo-circle">A1OS</div><nav class="sidebar-nav"><button class="active" data-panel="dashboard"><span>📊</span><span>Dashboard</span></button><button data-panel="memory"><span>🧠</span><span>Memory</span></button><button data-panel="knowledge"><span>📚</span><span>Knowledge</span></button><button data-panel="agents"><span>🤖</span><span>Agents</span></button><button data-panel="tasks"><span>📋</span><span>Tasks</span></button><button data-panel="cluster"><span>🌐</span><span>Cluster</span></button><button data-panel="consensus"><span>✅</span><span>Consensus</span></button><button data-panel="system"><span>⚙️</span><span>System</span></button><button class="settings" data-panel="settings"><span>⚙️</span><span>Settings</span></button></nav><div class="sidebar-status"><span class="dot offline" id="statusDot"></span><span id="statusText">Offline</span></div></aside><main class="main"><div class="chat-container" id="chatContainer"><div class="message system" id="welcome">⚡ A1OS v2.0 — Welcome.</div><div id="messages"></div></div><div class="quick-actions"><button onclick="cmd('show memory')">🧠 Memory</button><button onclick="cmd('show agents')">🤖 Agents</button><button onclick="cmd('show tasks')">📋 Tasks</button><button onclick="cmd('status')">📡 Status</button><button onclick="cmd('help')">❓ Help</button></div><div class="input-area"><input id="input" placeholder="Ask or type a command..." autofocus><button id="send">Send</button></div></main>
<script>const API='http://localhost:8086';const KEY='f8baeb69ea9311098aaa8992ada6ab1c6aeb42cfdcef3391c5f5d9ed353b2108';const chat=document.getElementById('chatContainer');const msgs=document.getElementById('messages');async function fetchJSON(url,opts={}){try{const r=await fetch(url,{...opts,headers:{'X-API-Key':KEY,'Content-Type':'application/json',...(opts.headers||{})}});if(!r.ok)throw new Error(r.status);return await r.json()}catch(e){return null}}function addMsg(text,type='ai'){const d=document.createElement('div');d.className='message '+type;d.innerHTML=text;msgs.appendChild(d);chat.scrollTop=chat.scrollHeight;return d}async function cmd(c){if(!c||!c.trim())return;const input=c.trim();const l=input.toLowerCase();addMsg(input,'user');document.getElementById('input').value='';const typing=addMsg('⏳...','ai');typing.id='typing';try{if(l==='help'){typing.remove();addMsg('🤖 <b>Commands</b><br>• add: text<br>• show memory<br>• show agents<br>• show tasks<br>• status','ai');return}if(l==='status'){typing.remove();const d=await fetchJSON(API+'/system/status');if(d){addMsg('📡 <b>Status</b><br>Memory: '+d.memory_count+'<br>Agents: '+d.agent_count+'<br>Tasks: '+d.tasks_total,'ai')}else{addMsg('❌ Failed','ai')}return}if(l==='show memory'){typing.remove();const d=await fetchJSON(API+'/memory');if(d&&d.length){addMsg('🧠 <b>Memory ('+d.length+')</b><br>'+d.map((x,i)=>(i+1)+'. '+(x.content||x.text)).join('<br>'),'ai')}else{addMsg('📭 Empty','ai')}return}if(l==='show agents'){typing.remove();const d=await fetchJSON(API+'/agents');if(d&&d.length){addMsg('🤖 <b>Agents ('+d.length+')</b><br>'+d.map(x=>'• '+x.name+' ('+x.status+')').join('<br>'),'ai')}else{addMsg('🤖 None','ai')}return}if(l==='show tasks'){typing.remove();const d=await fetchJSON(API+'/scheduler/tasks');if(d&&d.length){addMsg('📋 <b>Tasks ('+d.length+')</b><br>'+d.map(x=>'• '+(x.name||x.task)+' ('+x.status+')').join('<br>'),'ai')}else{addMsg('📋 None','ai')}return}if(l.startsWith('add:')){typing.remove();const t=input.slice(4).trim();if(!t){addMsg('⚠️ Text needed','ai');return}const r=await fetchJSON(API+'/memory/store',{method:'POST',body:JSON.stringify({content:t,type:'long_term'})});if(r&&r.ok){addMsg('✅ Added: '+t,'ai')}else{addMsg('❌ Failed','ai')}return}typing.remove();const s=await fetchJSON(API+'/memory/search?q='+encodeURIComponent(input));if(s&&s.length){addMsg('🔍 '+s.map((x,i)=>(i+1)+'. '+(x.content||x.text)).join('<br>'),'ai')}else{addMsg('🤔 No results','ai')}}catch(e){typing.remove();addMsg('❌ '+e.message,'ai')}}document.getElementById('send').addEventListener('click',()=>{cmd(document.getElementById('input').value)});document.getElementById('input').addEventListener('keypress',e=>{if(e.key==='Enter'){document.getElementById('send').click()}});document.querySelectorAll('.sidebar-nav button').forEach(b=>{b.addEventListener('click',()=>{document.querySelectorAll('.sidebar-nav button').forEach(x=>x.classList.remove('active'));b.classList.add('active')})});async function updateStatus(){const d=await fetchJSON(API+'/');const dot=document.getElementById('statusDot');const txt=document.getElementById('statusText');if(d&&d.status==='online'){dot.className='dot online';txt.textContent='Online'}else{dot.className='dot offline';txt.textContent='Offline'}}updateStatus();setInterval(updateStatus,30000);</script></body></html>
