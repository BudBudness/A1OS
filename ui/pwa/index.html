<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><title>A1OS</title>
<style>*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}body{background:#0b0b12;color:#e2e8f0;height:100vh;overflow:hidden;display:flex}.chat-main{flex:1;display:flex;flex-direction:column;height:100vh;min-width:0}.chat-header{padding:12px 16px;border-bottom:1px solid #1a1a2e;display:flex;align-items:center;gap:12px;flex-shrink:0}.chat-header .menu-btn{background:transparent;border:none;color:#94a3b8;font-size:24px;cursor:pointer;padding:4px 8px}.chat-header h1{font-size:18px;font-weight:600;color:#e2e8f0}.chat-header .status{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:11px;color:#64748b}.chat-header .status .dot{width:8px;height:8px;border-radius:50%;display:inline-block}.chat-header .status .dot.online{background:#10b981}.chat-header .status .dot.offline{background:#ef4444}.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}.chat-messages .msg{max-width:85%;padding:10px 14px;border-radius:12px;font-size:14px;line-height:1.5;word-wrap:break-word}.chat-messages .msg.user{align-self:flex-end;background:#1a1a2e;border:1px solid #2a2a3e;border-bottom-right-radius:4px}.chat-messages .msg.ai{align-self:flex-start;background:#11111a;border:1px solid #2a2a3e;border-bottom-left-radius:4px}.chat-messages .msg.system{align-self:center;color:#64748b;font-size:12px;background:transparent;border:none;padding:4px 0}.chat-input-wrapper{display:flex;align-items:center;gap:8px;padding:10px 16px 16px;border-top:1px solid #1a1a2e;background:#0b0b12;flex-shrink:0}.chat-input-wrapper .btn-icon{background:transparent;border:none;color:#94a3b8;font-size:20px;cursor:pointer;padding:8px;border-radius:50%;transition:all .2s;display:flex;align-items:center;justify-content:center;width:40px;height:40px}.chat-input-wrapper .btn-icon:hover{background:#1a1a2e;color:#e2e8f0}.chat-input-wrapper input{flex:1;padding:10px 16px;border-radius:24px;border:1px solid #2a2a3e;background:#11111a;color:#e2e8f0;font-size:14px;outline:none;min-width:0}.chat-input-wrapper input:focus{border-color:#6c5ce7}.chat-input-wrapper input::placeholder{color:#475569}.chat-input-wrapper .send-btn{padding:10px 20px;border-radius:24px;border:none;background:#6c5ce7;color:#fff;font-weight:600;font-size:14px;cursor:pointer;white-space:nowrap}.chat-input-wrapper .send-btn:hover{background:#5a4bd1}.quick-actions{display:flex;gap:6px;padding:0 16px 8px;flex-wrap:wrap;flex-shrink:0}.quick-actions button{padding:4px 12px;border-radius:16px;border:1px solid #2a2a3e;background:transparent;color:#94a3b8;font-size:11px;cursor:pointer;white-space:nowrap}.quick-actions button:hover{background:#1a1a2e;border-color:#6c5ce7;color:#e2e8f0}.sidebar{position:fixed;top:0;left:0;width:270px;height:100vh;background:#11111a;border-right:1px solid #2a2a3e;transform:translateX(-100%);transition:transform .3s ease;z-index:100;padding:16px 0;display:flex;flex-direction:column;overflow-y:auto}.sidebar.open{transform:translateX(0)}.sidebar-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:99;display:none}.sidebar-overlay.show{display:block}.sidebar .logo{padding:0 20px 16px;border-bottom:1px solid #1a1a2e;margin-bottom:12px;display:flex;align-items:center;gap:12px}.sidebar .logo .circle{display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#6c5ce7,#a29bfe);color:#fff;font-weight:700;font-size:14px}.sidebar .logo h2{font-size:18px;color:#e2e8f0}.sidebar-nav{display:flex;flex-direction:column;gap:2px;padding:0 12px;flex:1}.sidebar-nav button{background:transparent;border:none;color:#94a3b8;padding:10px 14px;border-radius:10px;cursor:pointer;text-align:left;font-size:14px;display:flex;align-items:center;gap:12px;width:100%}.sidebar-nav button:hover{background:#1a1a2e;color:#e2e8f0}.sidebar-nav button.active{background:#1a1a2e;color:#a78bfa}.sidebar-nav button .icon{font-size:18px;width:28px;text-align:center}.sidebar-settings{margin-top:auto;padding:12px 20px;border-top:1px solid #1a1a2e}.sidebar-settings button{background:transparent;border:none;color:#94a3b8;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:12px;width:100%;padding:8px 0}.sidebar-settings button:hover{color:#e2e8f0}.sidebar-status{padding:12px 20px;border-top:1px solid #1a1a2e;display:flex;align-items:center;gap:8px;font-size:12px;color:#64748b}.sidebar-status .dot{width:8px;height:8px;border-radius:50%;display:inline-block}.sidebar-status .dot.online{background:#10b981}.sidebar-status .dot.offline{background:#ef4444}@media(min-width:768px){.sidebar{transform:translateX(0);width:220px;position:relative;flex-shrink:0;z-index:1}.sidebar-overlay{display:none!important}.chat-header .menu-btn{display:none}}@media(max-width:480px){.chat-messages .msg{max-width:92%}.quick-actions{gap:4px}.quick-actions button{font-size:10px;padding:3px 10px}.chat-input-wrapper{gap:4px}.chat-input-wrapper .btn-icon{width:36px;height:36px;font-size:18px}.chat-input-wrapper input{font-size:13px}.chat-input-wrapper .send-btn{font-size:13px;padding:8px 16px}}</style></head>
<body><div class="sidebar-overlay" id="sidebarOverlay"></div><aside class="sidebar" id="sidebar"><div class="logo"><span class="circle">A1</span><h2>A1OS</h2></div><nav class="sidebar-nav"><button class="active" data-panel="dashboard"><span class="icon">📊</span> Dashboard</button><button data-panel="memory"><span class="icon">🧠</span> Memory</button><button data-panel="agents"><span class="icon">🤖</span> Agents</button><button data-panel="cluster"><span class="icon">🌐</span> Cluster</button><button data-panel="consensus"><span class="icon">✅</span> Consensus</button><button data-panel="tasks"><span class="icon">📋</span> Tasks</button><button data-panel="knowledge"><span class="icon">📚</span> Knowledge</button><button data-panel="events"><span class="icon">📡</span> Events</button></nav><div class="sidebar-settings"><button id="settingsBtn"><span style="font-size:18px;width:28px;text-align:center;">⚙️</span> Settings</button></div><div class="sidebar-status"><span class="dot offline" id="statusDotSidebar"></span> <span id="statusTextSidebar">Offline</span></div></aside><main class="chat-main"><div class="chat-header"><button class="menu-btn" id="menuBtn">☰</button><h1>A1OS</h1><div class="status"><span class="dot offline" id="statusDot"></span> <span id="statusText">Offline</span></div></div><div class="chat-messages" id="messages"><div class="msg system">⚡ A1OS v2.0 — 8 modules ready. Type a command.</div></div><div class="quick-actions"><button onclick="cmd('show memory')">🧠 Memory</button><button onclick="cmd('show agents')">🤖 Agents</button><button onclick="cmd('status')">📡 Status</button><button onclick="cmd('help')">❓ Help</button></div><div class="chat-input-wrapper"><button class="btn-icon" id="plusBtn">➕</button><input id="input" placeholder="Ask or type a command..." autofocus><button class="send-btn" id="send">Send</button></div></main><script>const API='http://localhost:8086';const KEY='f8baeb69ea9311098aaa8992ada6ab1c6aeb42cfdcef3391c5f5d9ed353b2108';const msgs=document.getElementById('messages');const input=document.getElementById('input');const sidebar=document.getElementById('sidebar');const overlay=document.getElementById('sidebarOverlay');async function fetchJSON(url,opts={}){try{const r=await fetch(url,{...opts,headers:{'X-API-Key':KEY,'Content-Type':'application/json',...(opts.headers||{})}});if(!r.ok)throw new Error(r.status);return await r.json()}catch(e){return null}}function addMsg(text,type='ai'){const d=document.createElement('div');d.className='msg '+type;d.innerHTML=text;msgs.appendChild(d);msgs.scrollTop=msgs.scrollHeight;return d}document.getElementById('plusBtn').addEventListener('click',()=>{msgs.innerHTML='<div class="msg system">⚡ A1OS — New conversation started.</div>'});document.getElementById('settingsBtn').addEventListener('click',()=>{addMsg('⚙️ <b>Settings</b><br>• API: '+API+'<br>• Theme: Dark','ai')});document.getElementById('menuBtn').addEventListener('click',()=>{sidebar.classList.toggle('open');overlay.classList.toggle('show')});overlay.addEventListener('click',()=>{sidebar.classList.remove('open');overlay.classList.remove('show')});document.querySelectorAll('.sidebar-nav button').forEach(b=>{b.addEventListener('click',()=>{document.querySelectorAll('.sidebar-nav button').forEach(x=>x.classList.remove('active'));b.classList.add('active');if(window.innerWidth<768){sidebar.classList.remove('open');overlay.classList.remove('show')}})});document.getElementById('send').addEventListener('click',()=>{cmd(input.value)});input.addEventListener('keypress',e=>{if(e.key==='Enter'){document.getElementById('send').click()}});async function cmd(c){if(!c||!c.trim())return;const inputText=c.trim();const l=inputText.toLowerCase();addMsg(inputText,'user');input.value='';const typing=addMsg('⏳ Thinking...','ai');typing.id='typing';try{if(l==='help'){typing.remove();addMsg('🤖 <b>Commands</b><br>• show memory<br>• show agents<br>• show tasks<br>• status<br>• help','ai');return}if(l==='status'){typing.remove();const d=await fetchJSON(API+'/system/status');if(d){addMsg('📡 <b>Status</b><br>Modules: '+(d.modules?.join(', ')||'none'),'ai')}else{addMsg('❌ Failed','ai')}return}if(l==='show memory'){typing.remove();const d=await fetchJSON(API+'/memory/stats');if(d){addMsg('🧠 <b>Memory</b><br>Total: '+d.total+'<br>Long-term: '+d.long_term+'<br>Working: '+d.working,'ai')}else{addMsg('📭 No memory data','ai')}return}if(l==='show agents'){typing.remove();const d=await fetchJSON(API+'/agents');if(d&&d.length){addMsg('🤖 <b>Agents ('+d.length+')</b><br>'+d.map(x=>'• '+x.name+' ('+x.status+')').join('<br>'),'ai')}else{addMsg('🤖 No agents','ai')}return}if(l==='show tasks'){typing.remove();const d=await fetchJSON(API+'/scheduler/tasks');if(d&&d.length){addMsg('📋 <b>Tasks ('+d.length+')</b><br>'+d.map(x=>'• '+x.name+' ('+x.status+')').join('<br>'),'ai')}else{addMsg('📋 No tasks','ai')}return}typing.remove();addMsg('🤔 Unknown command. Try: help, status, show memory, show agents, show tasks','ai')}catch(e){typing.remove();addMsg('❌ '+e.message,'ai')}}async function updateStatus(){const d=await fetchJSON(API+'/');const dots=document.querySelectorAll('.dot');const texts=document.querySelectorAll('#statusText,#statusTextSidebar');if(d&&d.status==='online'){dots.forEach(d=>d.className='dot online');texts.forEach(t=>t.textContent='Online')}else{dots.forEach(d=>d.className='dot offline');texts.forEach(t=>t.content='Offline')}}updateStatus();setInterval(updateStatus,30000);</script></body></html>
