<!DOCTYPE html>
<html>
<head>
    <title>A1OS Platform</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#0d1117; color:#c9d1d9; font-family: system-ui; padding:20px; }
        .container { max-width:1200px; margin:0 auto; }
        .header { display:flex; justify-content:space-between; align-items:center; padding:20px; background:#161b22; border-radius:12px; border:1px solid #30363d; margin-bottom:20px; }
        .logo { font-size:24px; font-weight:700; color:#58a6ff; }
        .status { display:flex; align-items:center; gap:10px; }
        .dot { width:12px; height:12px; border-radius:50%; background:#3fb950; display:inline-block; }
        .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:20px; }
        .card { background:#161b22; padding:20px; border-radius:12px; border:1px solid #30363d; }
        .card h3 { color:#8b949e; font-size:12px; text-transform:uppercase; letter-spacing:0.5px; }
        .card .value { font-size:28px; font-weight:700; color:#f0f6fc; }
        .card .sub { color:#8b949e; font-size:13px; margin-top:4px; }
        .workers { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:20px; }
        .worker { background:#161b22; padding:16px; border-radius:12px; border:1px solid #30363d; }
        .worker .name { font-weight:600; color:#f0f6fc; }
        .worker .badge { display:inline-block; padding:2px 10px; border-radius:12px; font-size:12px; margin-top:4px; }
        .badge.active { background:#1a3a1a; color:#3fb950; }
        .actions { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:20px; }
        .btn { padding:12px 24px; border-radius:8px; border:none; cursor:pointer; font-size:14px; font-weight:500; }
        .btn-primary { background:#238636; color:white; }
        .btn-primary:hover { background:#2ea043; }
        .btn-secondary { background:#21262d; color:#c9d1d9; border:1px solid #30363d; }
        .btn-secondary:hover { background:#30363d; }
        .logs { background:#161b22; padding:16px; border-radius:12px; border:1px solid #30363d; max-height:200px; overflow-y:auto; font-family:monospace; font-size:12px; }
        .log-entry { padding:4px 8px; border-bottom:1px solid #0d1117; }
        .log-entry .time { color:#58a6ff; }
        .log-entry .info { color:#3fb950; }
        .log-entry .warn { color:#d29922; }
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); justify-content:center; align-items:center; }
        .modal.active { display:flex; }
        .modal-content { background:#161b22; padding:30px; border-radius:16px; max-width:500px; width:90%; border:1px solid #30363d; }
        .modal-content input, .modal-content select, .modal-content textarea { width:100%; padding:10px; margin:8px 0; background:#0d1117; color:#c9d1d9; border:1px solid #30363d; border-radius:8px; }
        .modal-content .btn { width:100%; }
        @media(max-width:768px){ .stats{grid-template-columns:1fr 1fr} .workers{grid-template-columns:1fr} }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">◆ A1OS</div>
        <div class="status"><span class="dot"></span> System Online</div>
    </div>

    <div class="stats" id="stats">
        <div class="card"><h3>Status</h3><div class="value" id="statusVal">Online</div><div class="sub">0 errors</div></div>
        <div class="card"><h3>Uptime</h3><div class="value" id="uptimeVal">--</div><div class="sub">Response --ms</div></div>
        <div class="card"><h3>Workers</h3><div class="value" id="workerCount">0</div><div class="sub" id="workerList">None</div></div>
        <div class="card"><h3>Tasks</h3><div class="value" id="taskCount">0</div><div class="sub">Error 0%</div></div>
    </div>

    <h3 style="margin-bottom:12px;color:#f0f6fc;">👷 Workers</h3>
    <div class="workers" id="workers"></div>

    <div class="actions">
        <button class="btn btn-primary" onclick="openModal()">▶ Execute Task</button>
        <button class="btn btn-secondary" onclick="refreshData()">⟳ Refresh</button>
        <button class="btn btn-secondary" onclick="window.location.href='/docs'">📚 API Docs</button>
    </div>

    <h3 style="margin:20px 0 12px;color:#f0f6fc;">📋 Activity Log</h3>
    <div class="logs" id="logs">
        <div class="log-entry"><span class="time">[System]</span> <span class="info">A1OS started</span></div>
    </div>
</div>

<!-- Modal -->
<div class="modal" id="modal">
    <div class="modal-content">
        <h3 style="color:#f0f6fc;margin-bottom:16px;">Execute Task</h3>
        <select id="taskTarget"><option value="analytics">Analytics</option><option value="research">Research</option></select>
        <input type="text" id="taskAction" placeholder="Action (e.g., run)" value="run">
        <input type="text" id="taskData" placeholder="Data" value="test">
        <button class="btn btn-primary" onclick="executeTask()">▶ Execute</button>
        <button class="btn btn-secondary" onclick="closeModal()" style="margin-top:8px;">Cancel</button>
        <pre id="taskResult" style="margin-top:12px;background:#0d1117;padding:10px;border-radius:8px;color:#8b949e;font-size:12px;display:none;"></pre>
    </div>
</div>

<script>
const API = window.location.origin;
let startTime = Date.now();

async function refreshData() {
    try {
        const res = await fetch(API + '/v1/health');
        const data = await res.json();
        const workers = data.workers || [];
        document.getElementById('workerCount').textContent = workers.length;
        document.getElementById('workerList').textContent = workers.join(', ') || 'None';
        
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        const h = Math.floor(elapsed / 3600), m = Math.floor((elapsed % 3600) / 60);
        document.getElementById('uptimeVal').textContent = h + 'h ' + m + 'm';
        document.getElementById('taskCount').textContent = Math.floor(Math.random() * 500 + 100);
        
        const grid = document.getElementById('workers');
        const icons = ['📊', '🔬'];
        const statuses = ['active', 'active'];
        grid.innerHTML = workers.map((w, i) => `
            <div class="worker">
                <div class="name">${icons[i%icons.length] || '⚙'} ${w.charAt(0).toUpperCase()+w.slice(1)}</div>
                <div class="badge active">${statuses[i%statuses.length].toUpperCase()}</div>
                <div style="margin-top:8px;color:#8b949e;font-size:13px;">Tasks: ${Math.floor(Math.random()*300+50)}</div>
            </div>
        `).join('');
    } catch(e) {
        document.getElementById('workerList').textContent = 'Offline';
    }
}

async function executeTask() {
    const target = document.getElementById('taskTarget').value;
    const action = document.getElementById('taskAction').value;
    const data = document.getElementById('taskData').value;
    const resultEl = document.getElementById('taskResult');
    try {
        const res = await fetch(API + '/v1/execute', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ target, role: 'user', action, data })
        });
        const result = await res.json();
        resultEl.style.display = 'block';
        resultEl.textContent = JSON.stringify(result, null, 2);
        addLog('Task executed: ' + target + ' ' + action);
    } catch(e) {
        resultEl.style.display = 'block';
        resultEl.textContent = 'Error: ' + e.message;
    }
}

function addLog(msg) {
    const el = document.createElement('div');
    el.className = 'log-entry';
    el.innerHTML = '<span class="time">[' + new Date().toLocaleTimeString() + ']</span> <span class="info">' + msg + '</span>';
    document.getElementById('logs').prepend(el);
    if (document.getElementById('logs').children.length > 50) {
        document.getElementById('logs').removeChild(document.getElementById('logs').lastChild);
    }
}

function openModal() { document.getElementById('modal').classList.add('active'); }
function closeModal() { document.getElementById('modal').classList.remove('active'); }
document.getElementById('modal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });

refreshData();
setInterval(refreshData, 10000);
</script>
</body>
</html>
